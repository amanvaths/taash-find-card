name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: format · lint · check · unit · build · chromium smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (lockfile)
        run: npm ci

      - name: Format check
        run: npx prettier --check .

      - name: Lint
        run: npm run lint

      - name: Svelte check
        run: npm run check

      - name: Unit tests
        run: npm run test:unit -- --run

      - name: Production build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Chromium Playwright smoke
        run: npx playwright test --project=chromium
        env:
          CI: true
